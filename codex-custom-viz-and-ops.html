<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>makepdf Custom Viz and Operations</title>
<style>body{font-family:Inter,system-ui,sans-serif;margin:0;color:#172033;background:#f8fafc}main{padding:24px}.grid{display:grid;grid-template-columns:minmax(280px,1.2fr) minmax(260px,.8fr);gap:18px}.panel{background:#fff;border:1px solid #d7dde8;border-radius:8px;padding:16px}.task{display:grid;grid-template-columns:1fr 110px 110px;gap:10px;padding:12px;border-top:1px solid #e2e8f0}@media(max-width:760px){.grid{grid-template-columns:1fr}.task{grid-template-columns:1fr}}</style>
</head>
<body>
<main>
<p style="color:#64748b;font-size:13px;font-weight:700;text-transform:uppercase">Custom visualization + non-visual workflow</p>
<h1>makepdf Feature Desk</h1>
<div class="grid">
<section class="panel"><h2>Custom Insight Map</h2><svg viewBox="0 0 520 220" role="img" aria-label="Custom trend visualization" style="width:100%;height:260px"><rect width="520" height="220" rx="8" fill="#f8fafc"/><polyline points="28,170 74,140 120,151 166,101 212,116 258,79 304,58 350,72 396,42 442,54 488,31" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></section>
<section class="panel"><h2>Operations Desk</h2><input id="q" placeholder="Search workflow items" style="box-sizing:border-box;width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px"/><div id="tasks"></div></section>
</div>
</main>
<script>function TimelineView(){return true;}
const tasks=[['Review priority queue','Ops','Ready'],['Prepare customer follow-up','AI','Drafting'],['Attach evidence packet','Audit','Queued']];const box=document.getElementById('tasks');function draw(){const q=document.getElementById('q').value.toLowerCase();box.innerHTML=tasks.filter(t=>t.join(' ').toLowerCase().includes(q)).map(t=>'<div class="task"><strong>'+t[0]+'</strong><span>'+t[1]+'</span><span>'+t[2]+'</span></div>').join('')||'<p>No matching workflow items.</p>'}document.getElementById('q').addEventListener('input',draw);draw();</script>
</body>
</html>
