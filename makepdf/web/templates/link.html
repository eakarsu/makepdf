{% extends "base.html" %}
{% block title %}PDF Links - MakePDF{% endblock %}
{% block heading %}PDF Links{% endblock %}
{% block content %}

<div class="card">
    <h2>Add Link</h2>
    <form data-async action="/link/add" method="post" data-filename="with_link.pdf">
        <label for="la_file">PDF file</label>
        <input type="file" id="la_file" name="pdf_file" accept=".pdf" required>
        <div class="row">
            <div>
                <label for="la_page">Page number</label>
                <input type="number" id="la_page" name="page_num" value="1" min="1" required>
            </div>
            <div>
                <label for="la_x">X position</label>
                <input type="number" id="la_x" name="x" value="0" step="0.1" required>
            </div>
            <div>
                <label for="la_y">Y position</label>
                <input type="number" id="la_y" name="y" value="0" step="0.1" required>
            </div>
        </div>
        <div class="row">
            <div>
                <label for="la_w">Width</label>
                <input type="number" id="la_w" name="width" value="100" step="0.1" required>
            </div>
            <div>
                <label for="la_h">Height</label>
                <input type="number" id="la_h" name="height" value="20" step="0.1" required>
            </div>
        </div>
        <label for="la_url">URL</label>
        <input type="url" id="la_url" name="url" required placeholder="https://example.com">
        <button type="submit" class="btn">Add Link</button>
    </form>
</div>

<div class="card">
    <h2>Extract Links</h2>
    <form data-async action="/link/extract" method="post" data-json>
        <label for="le_file">PDF file</label>
        <input type="file" id="le_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Extract Links</button>
    </form>
    <pre id="link-extract-result" class="result-box hidden"></pre>
</div>

{% endblock %}
