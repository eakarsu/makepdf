{% extends "base.html" %}
{% block title %}Sign PDF - MakePDF{% endblock %}
{% block heading %}Sign PDF{% endblock %}
{% block content %}

<div class="card">
    <h2>Add Signature Image</h2>
    <form data-async action="/sign/add-signature" method="post" data-filename="signed.pdf">
        <label for="sig_pdf">PDF file</label>
        <input type="file" id="sig_pdf" name="pdf_file" accept=".pdf" required>
        <label for="sig_img">Signature image</label>
        <input type="file" id="sig_img" name="signature_image" accept="image/*" required>
        <div class="row">
            <div>
                <label for="sig_page">Page (0-indexed)</label>
                <input type="number" id="sig_page" name="page_num" value="0" min="0">
            </div>
            <div>
                <label for="sig_x">X position</label>
                <input type="number" id="sig_x" name="x" value="72" step="0.1">
            </div>
            <div>
                <label for="sig_y">Y position</label>
                <input type="number" id="sig_y" name="y" value="72" step="0.1">
            </div>
        </div>
        <div class="row">
            <div>
                <label for="sig_w">Width</label>
                <input type="number" id="sig_w" name="width" value="200" step="0.1">
            </div>
            <div>
                <label for="sig_h">Height</label>
                <input type="number" id="sig_h" name="height" value="80" step="0.1">
            </div>
        </div>
        <button type="submit" class="btn">Add Signature</button>
    </form>
</div>

<div class="card">
    <h2>Verify Signatures</h2>
    <form data-async action="/sign/verify" method="post" data-json-target="verify-result">
        <label for="ver_pdf">PDF file</label>
        <input type="file" id="ver_pdf" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Verify</button>
    </form>
    <div id="verify-result" class="result-box hidden"></div>
</div>

{% endblock %}
