{% extends "base.html" %}
{% block title %}Markup PDF - MakePDF{% endblock %}
{% block heading %}Markup PDF{% endblock %}
{% block content %}

<div class="card">
    <h2>Highlight Area</h2>
    <form data-async action="/markup/highlight" method="post" data-filename="highlighted.pdf">
        <label for="mh_file">PDF file</label>
        <input type="file" id="mh_file" name="pdf_file" accept=".pdf" required>
        <div class="row">
            <div>
                <label for="mh_page">Page number</label>
                <input type="number" id="mh_page" name="page_num" value="1" min="1" required>
            </div>
            <div>
                <label for="mh_x">X position</label>
                <input type="number" id="mh_x" name="x" value="0" step="0.1" required>
            </div>
            <div>
                <label for="mh_y">Y position</label>
                <input type="number" id="mh_y" name="y" value="0" step="0.1" required>
            </div>
        </div>
        <div class="row">
            <div>
                <label for="mh_w">Width</label>
                <input type="number" id="mh_w" name="width" value="100" step="0.1" required>
            </div>
            <div>
                <label for="mh_h">Height</label>
                <input type="number" id="mh_h" name="height" value="20" step="0.1" required>
            </div>
        </div>
        <button type="submit" class="btn">Add Highlight</button>
    </form>
</div>

<div class="card">
    <h2>Add Note</h2>
    <form data-async action="/markup/note" method="post" data-filename="annotated.pdf">
        <label for="mn_file">PDF file</label>
        <input type="file" id="mn_file" name="pdf_file" accept=".pdf" required>
        <div class="row">
            <div>
                <label for="mn_page">Page number</label>
                <input type="number" id="mn_page" name="page_num" value="1" min="1" required>
            </div>
            <div>
                <label for="mn_x">X position</label>
                <input type="number" id="mn_x" name="x" value="0" step="0.1" required>
            </div>
            <div>
                <label for="mn_y">Y position</label>
                <input type="number" id="mn_y" name="y" value="0" step="0.1" required>
            </div>
        </div>
        <label for="mn_text">Note text</label>
        <textarea id="mn_text" name="text" required placeholder="Enter your note..."></textarea>
        <button type="submit" class="btn">Add Note</button>
    </form>
</div>

{% endblock %}
