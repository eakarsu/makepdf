{% extends "base.html" %}
{% block title %}Extract Content - MakePDF{% endblock %}
{% block heading %}Extract Content{% endblock %}
{% block content %}

<div class="card">
    <h2>Extract Text</h2>
    <form data-async action="/extract/text" method="post" data-json-target="text-result">
        <label for="et_file">PDF file</label>
        <input type="file" id="et_file" name="pdf_file" accept=".pdf" required>
        <div class="checkbox-row">
            <input type="checkbox" id="by_page" name="by_page" value="true">
            <label for="by_page">Extract by page</label>
        </div>
        <button type="submit" class="btn">Extract Text</button>
    </form>
    <div id="text-result" class="result-box hidden"></div>
</div>

<div class="card">
    <h2>Extract Images</h2>
    <form data-async action="/extract/images" method="post" data-filename="extracted_images.zip">
        <label for="ei_file">PDF file</label>
        <input type="file" id="ei_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Extract Images</button>
    </form>
</div>

{% endblock %}
