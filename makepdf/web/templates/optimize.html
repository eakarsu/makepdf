{% extends "base.html" %}
{% block title %}Optimize PDF - MakePDF{% endblock %}
{% block heading %}Optimize PDF{% endblock %}
{% block content %}

<div class="card">
    <h2>Optimize</h2>
    <form data-async action="/optimize/run" method="post" data-filename="optimized.pdf">
        <label for="or_file">PDF file</label>
        <input type="file" id="or_file" name="pdf_file" accept=".pdf" required>
        <div class="checkbox-row">
            <input type="checkbox" id="or_dedup" name="remove_duplication" value="true" checked>
            <label for="or_dedup">Remove duplication</label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="or_meta" name="remove_metadata" value="true">
            <label for="or_meta">Remove metadata</label>
        </div>
        <button type="submit" class="btn">Optimize</button>
    </form>
</div>

<div class="card">
    <h2>Optimization Report</h2>
    <form data-async action="/optimize/report" method="post" data-json>
        <label for="orp_file">PDF file</label>
        <input type="file" id="orp_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Generate Report</button>
    </form>
    <pre id="optimize-report-result" class="result-box hidden"></pre>
</div>

{% endblock %}
