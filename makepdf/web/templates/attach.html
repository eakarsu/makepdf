{% extends "base.html" %}
{% block title %}PDF Attachments - MakePDF{% endblock %}
{% block heading %}PDF Attachments{% endblock %}
{% block content %}

<div class="card">
    <h2>Add Attachment</h2>
    <form data-async action="/attach/add" method="post" data-filename="with_attachment.pdf">
        <label for="aa_file">PDF file</label>
        <input type="file" id="aa_file" name="pdf_file" accept=".pdf" required>
        <label for="aa_att">Attachment file</label>
        <input type="file" id="aa_att" name="attachment" required>
        <label for="aa_desc">Description (optional)</label>
        <input type="text" id="aa_desc" name="description" placeholder="File description">
        <button type="submit" class="btn">Add Attachment</button>
    </form>
</div>

<div class="card">
    <h2>List Attachments</h2>
    <form data-async action="/attach/list" method="post" data-json>
        <label for="al_file">PDF file</label>
        <input type="file" id="al_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">List Attachments</button>
    </form>
    <pre id="attach-list-result" class="result-box hidden"></pre>
</div>

<div class="card">
    <h2>Extract Attachments</h2>
    <form data-async action="/attach/extract" method="post" data-filename="attachments.zip">
        <label for="ae_file">PDF file</label>
        <input type="file" id="ae_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Extract All</button>
    </form>
</div>

{% endblock %}
