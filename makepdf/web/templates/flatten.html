{% extends "base.html" %}
{% block title %}Flatten PDF - MakePDF{% endblock %}
{% block heading %}Flatten PDF{% endblock %}
{% block content %}

<div class="card">
    <h2>Flatten Forms</h2>
    <form data-async action="/flatten/forms" method="post" data-filename="flattened_forms.pdf">
        <label for="ff_file">PDF file</label>
        <input type="file" id="ff_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Flatten Forms</button>
    </form>
</div>

<div class="card">
    <h2>Flatten Annotations</h2>
    <form data-async action="/flatten/annotations" method="post" data-filename="flattened_annotations.pdf">
        <label for="fa_file">PDF file</label>
        <input type="file" id="fa_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Flatten Annotations</button>
    </form>
</div>

<div class="card">
    <h2>Flatten All</h2>
    <form data-async action="/flatten/all" method="post" data-filename="flattened.pdf">
        <label for="fl_file">PDF file</label>
        <input type="file" id="fl_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Flatten All</button>
    </form>
</div>

{% endblock %}
