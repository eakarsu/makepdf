{% extends "base.html" %}
{% block title %}Accessibility - MakePDF{% endblock %}
{% block heading %}PDF Accessibility{% endblock %}
{% block content %}

<div class="card">
    <h2>Set Language</h2>
    <form data-async action="/a11y/set-language" method="post" data-filename="accessible.pdf">
        <label for="al_file">PDF file</label>
        <input type="file" id="al_file" name="pdf_file" accept=".pdf" required>
        <label for="al_lang">Language code</label>
        <input type="text" id="al_lang" name="language" required placeholder="en-US">
        <button type="submit" class="btn">Set Language</button>
    </form>
</div>

<div class="card">
    <h2>Accessibility Check</h2>
    <form data-async action="/a11y/check" method="post" data-json>
        <label for="ac_file">PDF file</label>
        <input type="file" id="ac_file" name="pdf_file" accept=".pdf" required>
        <button type="submit" class="btn">Check Accessibility</button>
    </form>
    <pre id="a11y-check-result" class="result-box hidden"></pre>
</div>

{% endblock %}
